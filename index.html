<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎂 İyi ki Doğdun</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#091540,#1b3b6f,#ff8fc7);
font-family:Arial;
}

.stars{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:.5;
animation:move 40s linear infinite;
}
@keyframes move{
from{background-position:0 0}
to{background-position:400px 400px}
}

.scene{
position:relative;
text-align:center;
z-index:5;
}

.title{
font-size:55px;
color:#fff;
margin-bottom:20px;
text-shadow:0 0 20px gold;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

.cake{
position:relative;
width:260px;
height:220px;
margin:auto;
}

.layer1{
position:absolute;
bottom:0;
width:260px;
height:90px;
background:#ff7eb6;
border-radius:20px;
}

.layer2{
position:absolute;
bottom:80px;
left:35px;
width:190px;
height:70px;
background:#ffb3d9;
border-radius:20px;
}

.icing{
position:absolute;
top:0;
left:0;
width:100%;
height:15px;
background:white;
border-radius:20px;
}

.candle{
position:absolute;
width:10px;
height:45px;
background:#4cc9f0;
bottom:65px;
border-radius:5px;
}

.flame{
position:absolute;
width:16px;
height:24px;
left:-3px;
top:-20px;
background:gold;
border-radius:50%;
box-shadow:0 0 20px orange;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.15)}
}

button{
margin-top:40px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#ff1493;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#message{
display:none;
margin-top:25px;
font-size:48px;
color:yellow;
font-weight:bold;
text-shadow:0 0 20px white;
animation:pop 1s;
}

@keyframes pop{
from{
opacity:0;
transform:scale(.3);
}
to{
opacity:1;
transform:scale(1);
}
}

.confetti{
position:absolute;
width:10px;
height:14px;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

.balloon{
position:absolute;
bottom:-120px;
width:50px;
height:65px;
border-radius:50%;
animation:float 12s linear infinite;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:70px;
background:white;
left:24px;
top:65px;
}

@keyframes float{
to{
transform:translateY(-130vh);
}
}
</style>

</head>
<body>

<div class="stars"></div>

<div class="scene">

<div class="title">🎂 Doğum Günün Kutlu Olsun 🎂</div>

<div class="cake">

<div class="layer2">
<div class="icing"></div>

<div class="candle" style="left:20px"><div class="flame"></div></div>
<div class="candle" style="left:55px"><div class="flame"></div></div>
<div class="candle" style="left:90px"><div class="flame"></div></div>
<div class="candle" style="left:125px"><div class="flame"></div></div>
<div class="candle" style="left:160px"><div class="flame"></div></div>

</div>

<div class="layer1">
<div class="icing"></div>
</div>

</div>

<button onclick="celebrate()">🕯️ Mumları Üfle</button>

<div id="message">
🎉 İYİ Kİ DOĞDUN 🎉
</div>

</div>

<script>

for(let i=0;i<12;i++){

let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=
`hsl(${Math.random()*360},90%,60%)`;
b.style.animationDuration=
(8+Math.random()*6)+"s";
document.body.appendChild(b);

}

function celebrate(){

document.querySelectorAll(".flame").forEach(f=>{

f.animate([
{opacity:1},
{opacity:0,transform:"translateY(-35px) scale(2)"}
],{
duration:700,
fill:"forwards"
});

});

document.getElementById("message").style.display="block";

for(let i=0;i<250;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

fireworks();

}

function fireworks(){

for(let k=0;k<6;k++){

setTimeout(()=>{

let x=Math.random()*window.innerWidth;
let y=Math.random()*300+50;

for(let i=0;i<50;i++){

let s=document.createElement("div");

s.style.position="absolute";
s.style.left=x+"px";
s.style.top=y+"px";
s.style.width="6px";
s.style.height="6px";
s.style.borderRadius="50%";
s.style.background=
`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(s);

let angle=Math.random()*Math.PI*2;
let dist=80+Math.random()*100;

s.animate([
{
transform:"translate(0,0)",
opacity:1
},
{
transform:`translate(${Math.cos(angle)*dist}px,
${Math.sin(angle)*dist}px)`,
opacity:0
}
],{
duration:1200,
fill:"forwards"
});

setTimeout(()=>s.remove(),1200);

}

},k*500);

}

}

</script>

</body>
</html>
